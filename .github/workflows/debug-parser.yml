name: Debug Parser

on:
  workflow_dispatch:
    inputs:
      parser:
        description: "Parser name (e.g. gamespark, fourgamer)"
        required: true
        default: "gamespark"

jobs:

  debug:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Parser Test
        run: |
          python tools/parser_test.py "${{ github.event.inputs.parser }}"

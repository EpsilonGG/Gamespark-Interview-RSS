```yaml
name: Update RSS

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 拉取仓库
      # =========================

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Python 环境
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 安装依赖
      # =========================

      - name: Install dependencies
        run: pip install -r requirements.txt

      # =========================
      # 运行主程序
      # =========================

      - name: Run script
        run: python main.py

      # =========================
      # 提交 rss.xml + history.json
      # =========================

      - name: Commit and push files
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add rss.xml
          git add storage/history.json

          git diff --cached --quiet || git commit -m "Update RSS and history"

          git push
```

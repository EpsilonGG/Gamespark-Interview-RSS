name: Update RSS

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Commit rss.xml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add rss.xml

          git diff --cached --quiet || git commit -m "Update RSS"

          git push
